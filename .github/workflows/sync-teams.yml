name: Sync Teams

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Organization name'
        required: true
        type: string
      config-path:
        description: 'Path to teams config file'
        required: false
        default: '.github/teams.yaml'
        type: string
      dry-run:
        description: 'Run in dry-run mode'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  push:
    branches:
      - main
    paths:
      - '.github/teams.yaml'
      - '.github/workflows/sync-teams.yml'
      - 'scripts/sync-teams.ts'
  pull_request:
    branches:
      - main
    paths:
      - '.github/teams.yaml'
      - '.github/workflows/sync-teams.yml'
      - 'scripts/sync-teams.ts'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run lint
        run: npm run lint
      - name: Security audit
        run: npm audit

  sync:
    name: Sync Teams
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build action
        run: npm run build
      - name: Run team sync
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
        run: node dist/sync-teams.js --config=${{ github.event.inputs.config-path || '.github/teams.yaml' }} --dry-run=${{ github.event.inputs.dry-run || 'false' }} --org=${{ github.event.inputs.org || github.repository_owner }}
